name: Deploy Latest App Versions

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Copy latest versioned HTML to index.html in each app folder
        run: |
          for dir in */; do
            # Skip hidden dirs like .github
            [[ "$dir" == .* ]] && continue

            app="${dir%/}"

            # Find the highest-versioned HTML file (e.g. remember-v0.70.html)
            # Sort by major then minor version number numerically
            latest=$(ls "$app"/"$app"-v*.html 2>/dev/null \
              | sort -t'v' -k2 -V \
              | tail -1)

            if [ -n "$latest" ]; then
              cp "$latest" "$app/index.html"
              echo "✅ $app → copied $latest → index.html"
            else
              echo "⏭️  $app → no versioned HTML found, skipping"
            fi
          done

      - name: Commit and push updated index.html files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Auto-update index.html from latest versioned HTML"
          git push
