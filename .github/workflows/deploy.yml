# Remember App - Version 0.1063
# GitHub Actions workflow — deploys latest versioned HTML to index.html
# for all app subdirectories in everyday-apps.
#
# Remember Stable & Dev:
#   To bless a version: edit the stable-version.txt in the relevant folder
#   File should contain just the version number, e.g.: v0.1063
#   The workflow finds remember/remember-v0.1063.html and copies it to index.html
#
#   remember-stable/stable-version.txt  →  remember-stable/index.html
#   remember-dev/stable-version.txt     →  remember-dev/index.html
#
# Place this file at: .github/workflows/deploy.yml in your repo

name: Deploy Latest App Versions

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Copy latest versioned HTML to index.html in each app folder
        run: |
          for dir in */; do
            [[ "$dir" == .* ]] && continue
            app="${dir%/}"
            # Skip remember-stable and remember-dev — handled separately below
            [ "$app" = "remember-stable" ] && continue
            [ "$app" = "remember-dev" ] && continue

            latest=$(ls "$app"/"$app"-v*.html 2>/dev/null | sort -V | tail -1)

            if [ -n "$latest" ]; then
              cp "$latest" "$app/index.html"
              echo "✅ $app → copied $latest → index.html"

              if [ "$app" = "remember" ] && [ -f "$app/service-worker.js" ]; then
                VERSION=$(echo "$latest" | grep -oP 'v[\d.]+')
                VERSION=${VERSION%.}
                sed -i "s/const CACHE_VERSION = 'remember-v[^']*'/const CACHE_VERSION = 'remember-$VERSION'/" "$app/service-worker.js"
                echo "   ↳ service-worker.js updated to: remember-$VERSION"
              fi
            else
              echo "⏭️  $app → no versioned HTML found, skipping"
            fi
          done

      - name: Deploy remember-stable from stable-version.txt
        run: |
          if [ -f "remember-stable/stable-version.txt" ]; then
            VERSION=$(cat remember-stable/stable-version.txt | tr -d '[:space:]')
            SRC="remember/remember-${VERSION}.html"
            if [ -f "$SRC" ]; then
              cp "$SRC" "remember-stable/index.html"
              echo "✅ remember-stable → deployed $VERSION → index.html"
              if [ -f "remember-stable/service-worker.js" ]; then
                sed -i "s/const CACHE_VERSION = 'remember-stable-v[^']*'/const CACHE_VERSION = 'remember-stable-${VERSION}'/" "remember-stable/service-worker.js"
                echo "   ↳ service-worker.js updated to: remember-stable-${VERSION}"
              fi
            else
              echo "❌ remember-stable → $SRC not found"
              echo "   Make sure remember/remember-${VERSION}.html is committed"
            fi
          else
            echo "⏭️  remember-stable → no stable-version.txt, skipping"
          fi

      - name: Deploy remember-dev from stable-version.txt
        run: |
          if [ -f "remember-dev/stable-version.txt" ]; then
            VERSION=$(cat remember-dev/stable-version.txt | tr -d '[:space:]')
            SRC="remember/remember-${VERSION}.html"
            if [ -f "$SRC" ]; then
              cp "$SRC" "remember-dev/index.html"
              echo "✅ remember-dev → deployed $VERSION → index.html"
              if [ -f "remember-dev/service-worker.js" ]; then
                sed -i "s/const CACHE_VERSION = 'remember-dev-v[^']*'/const CACHE_VERSION = 'remember-dev-${VERSION}'/" "remember-dev/service-worker.js"
                echo "   ↳ service-worker.js updated to: remember-dev-${VERSION}"
              fi
            else
              echo "❌ remember-dev → $SRC not found"
              echo "   Make sure remember/remember-${VERSION}.html is committed"
            fi
          else
            echo "⏭️  remember-dev → no stable-version.txt, skipping"
          fi

      - name: Commit and push updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Auto-update index.html from latest versioned HTML"
          git push
